apiVersion: apps/v1
kind: Deployment
metadata:
  name: browser-ui
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: browser-ui
  template:
    metadata:
      labels:
        app: browser-ui
    spec:
      containers:
        - name: firefox
          image: jlesage/firefox
          imagePullPolicy: IfNotPresent

          ports:
            - containerPort: 5800

          env:
            - name: TZ
              value: "Asia/Kolkata"

            - name: DISPLAY_WIDTH
              value: "1024"
            - name: DISPLAY_HEIGHT
              value: "768"

          resources:
            requests:
              memory: "256Mi"
              cpu: "200m"
            limits:
              memory: "768Mi"
              cpu: "500m"
