apiVersion: apps/v1
kind: Deployment
metadata:
  name: browser-ui
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: browser-ui
  template:
    metadata:
      labels:
        app: browser-ui
    spec:
      containers:
        - name: lxde
          image: dorowu/ubuntu-desktop-lxde-vnc
          imagePullPolicy: IfNotPresent

          ports:
            - containerPort: 6080

          # 🔐 Secure credentials from Kubernetes Secret
          env:
            - name: USER
              valueFrom:
                secretKeyRef:
                  name: browser-auth
                  key: USER

            - name: PASSWORD
              valueFrom:
                secretKeyRef:
                  name: browser-auth
                  key: PASSWORD

            # ⚡ Performance tuning
            - name: RESOLUTION
              value: "1024x768"

          # 🧠 Resource optimization (IMPORTANT)
          resources:
            requests:
              memory: "256Mi"
              cpu: "200m"
            limits:
              memory: "768Mi"
              cpu: "500m"

          # 🩺 Optional health check
          readinessProbe:
            httpGet:
              path: /
              port: 6080
            initialDelaySeconds: 10
            periodSeconds: 10

          livenessProbe:
            httpGet:
              path: /
              port: 6080
            initialDelaySeconds: 30
            periodSeconds: 20
