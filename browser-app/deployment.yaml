apiVersion: apps/v1
kind: Deployment
metadata:
  name: browser-ui
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: browser-ui
  template:
    metadata:
      labels:
        app: browser-ui
    spec:
      containers:
        - name: lxde
          image: dorowu/ubuntu-desktop-lxde-vnc
          imagePullPolicy: IfNotPresent

          ports:
            - containerPort: 6079

          # 🔐 Secret-based auth (safe for Git)
          env:
            - name: USER
              valueFrom:
                secretKeyRef:
                  name: browser-auth
                  key: USER

            - name: PASSWORD
              valueFrom:
                secretKeyRef:
                  name: browser-auth
                  key: PASSWORD

            # ⚡ Performance tuning
            - name: RESOLUTION
              value: "1024x768"

          # 🧠 Resource optimization
          resources:
            requests:
              memory: "256Mi"
              cpu: "200m"
            limits:
              memory: "768Mi"
              cpu: "500m"

          # 🚀 VERY IMPORTANT: allow slow startup
          startupProbe:
            httpGet:
              path: /
              port: 6079
            failureThreshold: 60   # wait up to ~10 min
            periodSeconds: 10

          readinessProbe:
            httpGet:
              path: /
              port: 6079
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 5

          livenessProbe:
            httpGet:
              path: /
              port: 6079
            initialDelaySeconds: 180   # DO NOT reduce
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 5
