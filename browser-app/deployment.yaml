apiVersion: apps/v1
kind: Deployment
metadata:
  name: browser-ui
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: browser-ui
  template:
    metadata:
      labels:
        app: browser-ui
    spec:
      containers:
        - name: xfce
          image: accetto/ubuntu-vnc-xfce
          imagePullPolicy: IfNotPresent

          ports:
            - containerPort: 6901

          # 🔐 VNC password from secret (FIXED)
          env:
            - name: VNC_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: browser-auth
                  key: PASSWORD

            # 🔥 CRITICAL FIX (forces password reset)
            - name: RESET_VNC_PASSWORD
              value: "yes"

            # ⚡ Performance tuning
            - name: VNC_RESOLUTION
              value: "1024x768"

          # 🧠 Resource limits
          resources:
            requests:
              memory: "256Mi"
              cpu: "200m"
            limits:
              memory: "1Gi"
              cpu: "500m"
